<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tooltip példa</title>
<style>
    
/* Tooltip konténer */
.tooltip {
  position: relative;
  display: inline-block;
  cursor: pointer;
  color: blue;
  font-weight: bold;
}

/* Tooltip szöveg */
.tooltip .tooltiptext {
  visibility: hidden;
  width: 180px;
  background-color: #555;
  color: #fff;
  text-align: center;
  border-radius: 6px;
  padding: 5px;
  position: absolute;
  z-index: 1;
  bottom: 125%; /* tooltip pozíciója a betű felett */
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  transition: opacity 0.3s;
}

/* Tooltip nyíl */
.tooltip .tooltiptext::after {
  content: "";
  position: absolute;
  top: 100%; /* a nyíl a tooltip alján */
  left: 50%;
  margin-left: -5px;
  border-width: 5px;
  border-style: solid;
  border-color: #555 transparent transparent transparent;
}

/* Hover hatás: tooltip látható lesz */
.tooltip:hover .tooltiptext {
  visibility: visible;
  opacity: 1;
}
</style>
</head>
<body>

    <br><br><br><br><br><br><br>
<p>Ez egy példa: <span class="tooltip">i
  <span class="tooltiptext">ezzel nem kell foglalkozni</span>
</span> betűre menve látható a szöveg.</p>

</body>
</html>
